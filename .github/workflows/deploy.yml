name: CI/CD Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/three-tier-backend:latest ./backend

    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/three-tier-backend:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/three-tier-backend:latest
          docker stop three-tier-backend || true
          docker rm three-tier-backend || true
          docker run -d -p 3000:3000 --name three-tier-backend ${{ secrets.DOCKER_USERNAME }}/three-tier-backend:latest
