name: CI/CD Deploy + Monitoring

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/three-tier-backend:latest ./backend

    - name: Push Backend Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/three-tier-backend:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # ---- Backend ----
          docker pull ${{ secrets.DOCKER_USERNAME }}/three-tier-backend:latest
          docker stop three-tier-backend || true
          docker rm three-tier-backend || true
          docker run -d -p 3000:3000 --name three-tier-backend ${{ secrets.DOCKER_USERNAME }}/three-tier-backend:latest

          # ---- Prometheus ----
          docker pull prom/prometheus:latest
          docker stop prometheus || true
          docker rm prometheus || true
          docker run -d -p 9090:9090 --name prometheus \
            -v /home/ec2-user/three-tier-architecture/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
            prom/prometheus:latest

          # ---- Grafana ----
          docker pull grafana/grafana:latest
          docker stop grafana || true
          docker rm grafana || true
          docker run -d -p 3001:3000 --name grafana grafana/grafana:latest
